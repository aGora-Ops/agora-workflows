name: Terraform Apply

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: environments/dev
      aws_region:
        required: false
        type: string
        default: us-east-1
      terraform_version:
        required: false
        type: string
        default: "1.8.0"
    secrets:
      AWS_APPLY_ROLE_ARN:
        required: true
      ARGOCD_REPO_PAT:
        required: false

jobs:
  terraform-apply:
    name: Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — full permissions)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}

      - name: Terraform Apply
        env:
          TF_VAR_argocd_repo_pat: ${{ secrets.ARGOCD_REPO_PAT }}
        run: terraform apply -input=false -auto-approve tfplan.binary
