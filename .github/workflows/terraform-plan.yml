name: Terraform Plan

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: environments/dev
      aws_region:
        required: false
        type: string
        default: us-east-1
      terraform_version:
        required: false
        type: string
        default: "1.8.0"
      alert_email:
        description: "Value for the required var.alert_email (passed as TF_VAR)"
        required: false
        type: string
        default: ""
    secrets:
      AWS_PLAN_ROLE_ARN:
        required: true
      INFRACOST_API_KEY:
        required: false

jobs:
  terraform-plan:
    name: Plan (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    env:
      # Step-level `if:` can't reference `secrets.*` directly — only env/job
      # outputs are visible there. Hoist it once so the Infracost steps below
      # can gate on whether the secret is actually set.
      HAS_INFRACOST_KEY: ${{ secrets.INFRACOST_API_KEY != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — plan only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        env:
          # var.alert_email has no default; supply it without committing the
          # address. Other vars come from the auto-loaded terraform.tfvars in
          # each environment directory (no -var-file needed for dir-per-env).
          TF_VAR_alert_email: ${{ inputs.alert_email }}
        run: |
          terraform plan \
            -input=false \
            -out=tfplan.binary \
            -no-color 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/tfplan.binary
          retention-days: 1

      - name: Setup Infracost
        if: github.event_name == 'pull_request' && env.HAS_INFRACOST_KEY == 'true'
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost cost diff
        if: github.event_name == 'pull_request' && env.HAS_INFRACOST_KEY == 'true'
        run: |
          infracost breakdown --path tfplan.binary \
            --format json \
            --out-file /tmp/infracost.json

      - name: Post Infracost comment to PR
        if: github.event_name == 'pull_request' && env.HAS_INFRACOST_KEY == 'true'
        run: |
          infracost comment github \
            --path /tmp/infracost.json \
            --repo "${{ github.repository }}" \
            --pull-request "${{ github.event.pull_request.number }}" \
            --github-token "${{ github.token }}" \
            --behavior update

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ inputs.working_directory }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n...[truncated]' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`${{ inputs.environment }}\`\n\`\`\`\n${truncated}\n\`\`\``
            });
