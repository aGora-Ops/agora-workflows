name: Docker Build & Trivy Scan

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      dockerfile_path:
        required: false
        type: string
        default: Dockerfile
      aws_region:
        required: false
        type: string
        default: us-east-1
      run_trivy:
        required: false
        type: boolean
        default: true
    outputs:
      tag:
        value: ${{ jobs.generate-tag.outputs.tag }}
      tag_exists:
        value: ${{ jobs.generate-tag.outputs.tag_exists }}
      image_exists:
        value: ${{ jobs.generate-tag.outputs.image_exists }}
      build_result:
        value: ${{ jobs.build-image.result }}
      trivy_result:
        value: ${{ jobs.trivy.result }}

jobs:
  generate-tag:
    name: Generate Image Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      tag_exists: ${{ steps.check.outputs.tag_exists }}
      image_exists: ${{ steps.check.outputs.image_exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            # Semantic version, bumped by scanning every commit message since
            # the last vX.Y.Z tag (or full history if none exists yet) for
            # conventional-commit prefixes. Highest-severity match wins:
            #   feat!: / type(scope)!: / "BREAKING CHANGE:" anywhere -> major
            #   feat: / feat(scope):                               -> minor
            #   anything else (fix:, chore:, or no convention at all) -> patch
            # --match 'v*' keeps this immune to any non-semver tag that might
            # exist for another reason (e.g. develop-<sha> is never pushed as
            # a real git tag today, but this is a free safety margin either way).
            LAST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "v0.0.0")
            MAJOR=$(echo "$LAST_TAG" | cut -d. -f1 | tr -d v)
            MINOR=$(echo "$LAST_TAG" | cut -d. -f2)
            PATCH=$(echo "$LAST_TAG" | cut -d. -f3)

            if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
              COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s%n%b")
            else
              COMMITS=$(git log --pretty=format:"%s%n%b")
            fi

            if echo "$COMMITS" | grep -qE '^[a-zA-Z]+(\([^)]*\))?!:|BREAKING CHANGE:'; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
              BUMP="major"
            elif echo "$COMMITS" | grep -qE '^feat(\([^)]*\))?:'; then
              MINOR=$((MINOR + 1)); PATCH=0
              BUMP="minor"
            else
              PATCH=$((PATCH + 1))
              BUMP="patch"
            fi
            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
            echo "Bump type: ${BUMP} (last tag: ${LAST_TAG})"
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            SHA=$(echo "${{ github.sha }}" | cut -c1-8)
            NEW_TAG="develop-${SHA}"
          else
            BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-40)
            SHA=$(echo "${{ github.sha }}" | cut -c1-8)
            NEW_TAG="${BRANCH}-${SHA}"
          fi
          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "Generated tag: ${NEW_TAG}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Check if image tag already exists in ECR
        id: check
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if aws ecr describe-images \
            --repository-name "${{ inputs.service_name }}" \
            --image-ids imageTag="${TAG}" \
            --region "${{ inputs.aws_region }}" > /dev/null 2>&1; then
            EXISTS="true"
          else
            EXISTS="false"
          fi
          echo "tag_exists=${EXISTS}" >> "$GITHUB_OUTPUT"
          echo "image_exists=${EXISTS}" >> "$GITHUB_OUTPUT"
          echo "Image tag ${TAG} exists in ECR: ${EXISTS}"

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: generate-tag
    if: needs.generate-tag.outputs.image_exists == 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: false
          tags: ${{ inputs.service_name }}:${{ needs.generate-tag.outputs.tag }}
          outputs: type=docker,dest=/tmp/${{ inputs.service_name }}.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service_name }}-image
          path: /tmp/${{ inputs.service_name }}.tar
          retention-days: 1

  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [generate-tag, build-image]
    # Used to skip on push entirely (PR-only) — meant the actual path that
    # ships to ECR had zero vulnerability scanning. Now runs on every event;
    # callers must add `needs: [build, trivy]` on their push job (not just
    # `needs: build`) for a CRITICAL/HIGH finding to actually block the
    # image from reaching ECR, not just fail the workflow after it's already
    # pushed.
    if: inputs.run_trivy
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.service_name }}-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/${{ inputs.service_name }}.tar

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8
        with:
          image-ref: "${{ inputs.service_name }}:${{ needs.generate-tag.outputs.tag }}"
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          # Only block on CVEs that have an available fix. OS-level vulns with
          # status "affected"/"fix_deferred" (no upstream patch yet) are noise
          # here — the base image vendor hasn't shipped a fix so we can't act
          # on them. This still catches anything where a patched version exists
          # but we haven't pinned to it.
          ignore-unfixed: true
