name: Docker Build & Trivy Scan

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      dockerfile_path:
        required: false
        type: string
        default: Dockerfile
      aws_region:
        required: false
        type: string
        default: us-east-1
      run_trivy:
        required: false
        type: boolean
        default: true
    outputs:
      tag:
        value: ${{ jobs.generate-tag.outputs.tag }}
      tag_exists:
        value: ${{ jobs.generate-tag.outputs.tag_exists }}
      image_exists:
        value: ${{ jobs.generate-tag.outputs.image_exists }}
      build_result:
        value: ${{ jobs.build-image.result }}
      trivy_result:
        value: ${{ jobs.trivy.result }}

jobs:
  generate-tag:
    name: Generate Image Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      tag_exists: ${{ steps.check.outputs.tag_exists }}
      image_exists: ${{ steps.check.outputs.image_exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            MAJOR=$(echo $LAST_TAG | cut -d. -f1 | tr -d v)
            MINOR=$(echo $LAST_TAG | cut -d. -f2)
            PATCH=$(echo $LAST_TAG | cut -d. -f3)
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          else
            BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-40)
            SHA=$(echo "${{ github.sha }}" | cut -c1-8)
            NEW_TAG="${BRANCH}-${SHA}"
          fi
          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "Generated tag: ${NEW_TAG}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Check if image tag already exists in ECR
        id: check
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          EXISTS=$(aws ecr describe-images \
            --repository-name "${{ inputs.service_name }}" \
            --image-ids imageTag="${TAG}" \
            --region "${{ inputs.aws_region }}" 2>/dev/null && echo "true" || echo "false")
          echo "tag_exists=${EXISTS}" >> "$GITHUB_OUTPUT"
          echo "image_exists=${EXISTS}" >> "$GITHUB_OUTPUT"
          echo "Image exists: ${EXISTS}"

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: generate-tag
    if: needs.generate-tag.outputs.image_exists == 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: false
          tags: ${{ inputs.service_name }}:${{ needs.generate-tag.outputs.tag }}
          outputs: type=docker,dest=/tmp/${{ inputs.service_name }}.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service_name }}-image
          path: /tmp/${{ inputs.service_name }}.tar
          retention-days: 1

  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [generate-tag, build-image]
    if: inputs.run_trivy && github.event_name != 'push'
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.service_name }}-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/${{ inputs.service_name }}.tar

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d
        with:
          image-ref: "${{ inputs.service_name }}:${{ needs.generate-tag.outputs.tag }}"
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
