name: Gitleaks — Secret Detection

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string

jobs:
  gitleaks:
    name: Scan for secrets (${{ inputs.service_name }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --redact --no-git=false --exit-code 1
